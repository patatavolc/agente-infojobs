name: infojobs_agent
channels:
    - conda-forge
    - defaults
dependencies:
    - python=3.11
    - pip
    - pip:
          # FastAPI y servidor
          - fastapi
          - uvicorn[standard]
          - python-multipart

          # Clientes HTTP ASÍNCRONOS
          - httpx # Reemplaza requests para async
          - aiohttp # Alternativa async

          # Utilidades web
          - python-dotenv

          # IA y LangChain
          - openai
          - langchain>=0.3
          - langchain-core
          - langchain-openai
          - langchain-community

          # Validación
          - pydantic
          - pydantic-core

          # Base de datos ASÍNCRONA
          - asyncpg # Reemplaza psycopg2 para async
          # psycopg2-binary  # Removido - usamos asyncpg

          # Utilidades
          - sniffio
